{% extends 'base.html' %}

{% block title %}Login | Central Brain{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Administrator Login</h2>
        
        {% if form.errors %}
        <div style="color: var(--danger); background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.9rem;">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem;">
            Access restricted to authorized personnel only.
        </p>
    </div>
</div>
{% endblock %}
